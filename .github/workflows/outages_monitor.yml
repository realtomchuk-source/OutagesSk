name: Outages Monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */2 * * *'
    - cron: '30 20 * * *' # 23:30 Kyiv Summer time (UTC+3)
    - cron: '30 21 * * *' # 23:30 Kyiv Winter time (UTC+2)
  workflow_dispatch:

env:
  TZ: Europe/Kyiv

permissions:
  contents: write

jobs:
  run-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Collector (Parser)
        run: python collector.py

      - name: Run Formatter (AI & TG)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: python formatter.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ auth_config.js || true
          git commit -m "Update outages and messages" || echo "No changes to commit"
          git push
