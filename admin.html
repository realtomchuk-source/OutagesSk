<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмінка Starokostiantyniv Power Outage</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --secondary-text: #555;
            --border: #e0e0e0;
            --primary: #4a6cf7;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #2ecc71;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 8px;
        }
        body.dark {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #eee;
            --secondary-text: #ccc;
            --border: #2a2a4a;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 1100px; width: 100%; margin-top: 5vh; }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }
        .auth-form { display: flex; gap: 10px; max-width: 400px; margin: 40px auto; }
        .auth-form input {
            flex: 1; padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px; background: var(--bg); color: var(--text);
        }
        .btn {
            padding: 10px 20px; border: none;
            border-radius: var(--radius); cursor: pointer;
            font-size: 14px; font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn:hover { opacity: 0.85; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            padding: 8px 16px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); cursor: pointer;
            font-size: 14px; color: var(--text);
        }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .feed-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .feed-column h3 { margin-bottom: 12px; }
        .feed-content { max-height: 600px; overflow-y: auto; }
        .feed-content ul { list-style: none; padding-left: 0; }
        .feed-content li { padding: 6px 0; border-bottom: 1px solid var(--border); }
        .empty { color: #888; font-style: italic; }
        .telegram-posts { display: grid; gap: 15px; }
        .post-card {
            border: 1px solid var(--border);
            border-radius: var(--radius); padding: 15px;
            position: relative;
        }
        .post-card .post-date { font-weight: bold; margin-bottom: 8px; }
        .post-card .post-body { white-space: pre-wrap; font-family: monospace; font-size: 14px; }
        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 4px; padding: 4px 8px;
            cursor: pointer; font-size: 12px;
        }
        .status-bar {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .status-ok { background: #e6ffed; color: #0a5e2e; }
        .status-error { background: #ffeaea; color: #a00; }
        body.dark .status-ok { background: #1a3a2a; color: #7ee0a0; }
        body.dark .status-error { background: #3a1a1a; color: #ff8888; }
        
        /* Стилі для таблиці сирих даних */
        .raw-table-container { overflow-x: auto; max-height: 70vh; border-radius: var(--radius); border: 1px solid var(--border); }
        .raw-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .raw-table th, .raw-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 10px; vertical-align: top; }
        .raw-table th { background: var(--bg); font-weight: bold; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 var(--border); }
        .raw-table tr:nth-child(even) { background: rgba(0,0,0,0.02); }
        body.dark .raw-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        .raw-table td ul { margin: 0; padding-left: 15px; list-style-type: square; }
        .raw-table td details summary { cursor: pointer; color: var(--text); outline: none; font-weight: 500; }
        .raw-table td details summary:hover { color: var(--primary); }
        .raw-table td .house-numbers { font-size: 13px; color: var(--secondary-text); padding: 4px 0 4px 10px; border-left: 2px solid var(--primary); margin: 4px 0 8px 5px; }
        .raw-table td ul.streets-list-raw { list-style-type: none; padding-left: 0; }
        .raw-table td ul.streets-list-raw > li { margin-bottom: 4px; }

        /* Стилі для бігучої стрічки (Ticker) */
        .ticker-wrapper { background: rgba(0,0,0,0.02); border: 1px solid var(--border); margin-bottom: 15px; border-radius: 8px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        body.dark .ticker-wrapper { background: rgba(255,255,255,0.03); }
        
        .ticker-marquee { 
            display: block; overflow-x: scroll; white-space: nowrap; padding: 10px 0;
            scrollbar-width: none; -ms-overflow-style: none; cursor: default;
        }
        .ticker-marquee::-webkit-scrollbar { display: none; }
        
        .ticker-group { display: inline-block; vertical-align: middle; padding-right: 40px; }
        .ticker-items { display: inline-block; vertical-align: middle; font-size: 14px; }
        
        /* Неонові бейджі */
        .sticky-badge { position: sticky; left: 0px; z-index: 10; margin-right: 15px; vertical-align: middle; }
        .neon-badge {
            display: inline-block; padding: 4px 12px; border-radius: 50px;
            font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .neon-danger {
            color: #ff4757; background-color: var(--card-bg);
            background-image: linear-gradient(rgba(255, 71, 87, 0.1), rgba(255, 71, 87, 0.1));
            border: 1px solid rgba(255, 71, 87, 0.3); box-shadow: 0 0 10px rgba(255, 71, 87, 0.15);
        }
        .neon-warning {
            color: #e67e22; background-color: var(--card-bg);
            background-image: linear-gradient(rgba(230, 126, 34, 0.1), rgba(230, 126, 34, 0.1));
            border: 1px solid rgba(230, 126, 34, 0.3); box-shadow: 0 0 10px rgba(230, 126, 34, 0.15);
        }
        .ticker-settlement { font-weight: 600; color: var(--text); }
        .ticker-streets { color: var(--secondary-text); font-size: 0.95em; font-style: italic; }
        .ticker-separator { color: var(--border); margin: 0 25px; font-size: 16px; opacity: 0.6; }

        /* Стилі для контенту стрічки (нормалізація шрифтів та структури) */
        .section-title { margin-bottom: 8px; color: var(--secondary-text); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .feed-content-block { font-size: 15px; color: var(--text); margin-top: 5px; }
        /* Приховуємо дублюючі заголовки (Сьогодні/Завтра) згенеровані ШІ */
        .feed-content-block h1, .feed-content-block h2, .feed-content-block h3, .feed-content-block h4 { display: none; }
        .feed-content-block h5, .feed-content-block h6 { font-size: 16px; font-weight: 600; margin: 20px 0 10px 0; color: var(--text); }
        .feed-content-block ul { list-style: none; padding: 0; margin: 0; }
        /* Картки для кожного часового проміжку */
        .feed-content-block > ul > li { background: rgba(0,0,0,0.015); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; margin-bottom: 12px; }
        body.dark .feed-content-block > ul > li { background: rgba(255,255,255,0.015); }
        .feed-content-block > ul > li > strong { font-size: 15px; font-weight: 600; }
        /* Сітка для списку вулиць (2-3 колонки) */
        .feed-content-block ul ul { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px 15px; }
        .feed-content-block ul ul li { font-size: 14px; color: var(--secondary-text); position: relative; padding-left: 12px; margin-bottom: 0; background: transparent; border: none; }
        .feed-content-block ul ul li::before { content: "▪"; color: var(--primary); position: absolute; left: 0; opacity: 0.6; }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .toggle-dark {
            position: absolute; top: 15px; right: 20px;
            background: var(--bg); border: 1px solid var(--border);
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
            color: var(--text);
        }
    </style>
</head>
<body>
    <button class="toggle-dark" onclick="document.body.classList.toggle('dark')">🌓 Тема</button>
    <div class="container" id="app"></div>

    <script>
        // Сюди formatter.py вставить хеш. Якщо цього не сталося, вставте вручну.
        const ADMIN_HASH = "96ff3433941eb856cc09904bf8371cbb3ed36d38e12b99d970c3613c8e7cd1d0";

        const app = document.getElementById('app');

        async function sha256(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login() {
            app.innerHTML = `
                <div class="card">
                    <h2>Вхід до адмінки</h2>
                    <div class="auth-form">
                        <input type="password" id="passInput" placeholder="Пароль">
                        <button class="btn btn-primary" onclick="checkPassword()">Увійти</button>
                    </div>
                    <p id="errorMsg" style="color:red; display:none;">Невірний пароль</p>
                </div>`;
        }

        async function checkPassword() {
            const pass = document.getElementById('passInput').value;
            const hash = await sha256(pass);
            if (hash === ADMIN_HASH) {
                showDashboard();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        async function showDashboard() {
            app.innerHTML = `
                <div class="card">
                    <h2>Адмінка – Starokostiantyniv Outage Monitor</h2>
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('feed')">Стрічка</button>
                        <button class="tab" onclick="switchTab('telegram')">Telegram</button>
                        <button class="tab" onclick="switchTab('archive')">Архів</button>
                        <button class="tab" onclick="switchTab('raw')">Сирі дані</button>
                    </div>
                    <div id="tabContent"></div>
                </div>
                <div id="statusArea"></div>`;
            await loadData();
            
            // Автоматичне оновлення даних кожні 5 хвилин (300 000 мілісекунд)
            if (!window.autoRefresh) {
                window.autoRefresh = setInterval(loadData, 300000);
            }
        }

        let currentTab = 'feed';
        let messages = [];
        let updateLog = [];
        let rawOutages = [];

        async function loadData() {
            try {
                const msgResp = await fetch('data/messages.json');
                if (msgResp.ok) messages = await msgResp.json();
                else console.warn("messages.json не знайдено");

                const logResp = await fetch('data/update_log.json');
                if (logResp.ok) updateLog = await logResp.json();
                else console.warn("update_log.json не знайдено");

                const rawResp = await fetch('data/outages_snapshot.json');
                if (rawResp.ok) rawOutages = await rawResp.json();
                else console.warn("outages_snapshot.json не знайдено");

                renderTab(currentTab);
                renderStatus();
            } catch (err) {
                console.error(err);
                document.getElementById('statusArea').innerHTML = '<div class="status-bar status-error">⚠️ Не вдалося завантажити дані</div>';
            }
        }

        function renderTab(tab) {
            currentTab = tab;
            const container = document.getElementById('tabContent');
            if (!container) return;

            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'feed') || (i === 1 && tab === 'telegram') || (i === 2 && tab === 'archive'));
                t.classList.toggle('active', (i === 0 && tab === 'feed') || (i === 1 && tab === 'telegram') || (i === 2 && tab === 'archive') || (i === 3 && tab === 'raw'));
            });

            if (tab === 'feed') renderFeed(container);
            else if (tab === 'telegram') renderTelegram(container);
            else if (tab === 'archive') renderArchive(container);
            else if (tab === 'raw') renderRaw(container);
        }

        function getFormattedDate(offsetDays) {
            const d = new Date();
            d.setDate(d.getDate() + offsetDays);
            return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\./g, '.'); // 11.05.2026
        }

        function parseDt(dtStr) {
            if (!dtStr) return null;
            // Виправляємо склеєну дату, наприклад "10.05.202621:12" -> "10.05.2026 21:12"
            if (dtStr.length >= 5 && !dtStr.includes(" ")) {
                dtStr = dtStr.slice(0, -5) + " " + dtStr.slice(-5);
            }
            const parts = dtStr.split(" ");
            if (parts.length !== 2) return null;
            const dateParts = parts[0].split(".");
            const timeParts = parts[1].split(":");
            return new Date(dateParts[2], dateParts[1] - 1, dateParts[0], timeParts[0], timeParts[1]);
        }

        function isActiveOnDate(rec, targetDateStr) {
            const start = parseDt(rec.start_datetime);
            const end = parseDt(rec.end_datetime);
            if (!start || !end) return false;
            
            const tParts = targetDateStr.split(".");
            const dayStart = new Date(tParts[2], tParts[1] - 1, tParts[0], 0, 0, 0);
            const dayEnd = new Date(tParts[2], tParts[1] - 1, tParts[0], 23, 59, 59);
            
            return start <= dayEnd && end >= dayStart;
        }

        function buildTickerText(targetDateStr) {
            if (!rawOutages || rawOutages.length === 0) return `<div class="ticker-group">Дані відсутні або завантажуються...</div>`;
            
            // Фільтруємо записи, які перетинаються з цією датою (повноцінна перевірка)
            const relevant = rawOutages.filter(rec => isActiveOnDate(rec, targetDateStr));
            
            if (relevant.length === 0) return `<div class="ticker-group">✅ Відключення не зафіксовані.</div>`;

            // Групуємо за часом та типом
            const groups = {};
            relevant.forEach(rec => {
                let dtStart = rec.start_datetime.slice(-5); // беремо тільки години:хвилини
                let dtEnd = rec.end_datetime ? rec.end_datetime.slice(-5) : "?";
                let typeStr = rec.type.includes('Аварійні') ? 'Аварійні' : 'Планові';
                let key = `${typeStr}|${dtStart}-${dtEnd}`;
                
                if (!groups[key]) groups[key] = [];
                groups[key].push({
                    settlement: rec.settlement || 'Невідомо',
                    streets: (rec.streets && rec.streets.length > 0) ? rec.streets.join(', ') : 'всі вулиці'
                });
            });

            // Формуємо рядок
            let elements = [];
            for (const [typeTimeKey, items] of Object.entries(groups)) {
                const [typeStr, timeStr] = typeTimeKey.split('|');
                const badgeClass = typeStr === 'Аварійні' ? 'neon-danger' : 'neon-warning';
                
                // Формуємо список: Село (вулиці)
                let locationsHTML = items.map(item => 
                    `<span class="ticker-settlement">${escapeHtml(item.settlement)}</span> <span class="ticker-streets">(${escapeHtml(item.streets)})</span>`
                ).join(', ');

                elements.push(`
                    <span class="ticker-item">
                        <span class="neon-badge ${badgeClass}">${typeStr} ${timeStr}</span>
                        <span>${locationsHTML}</span>
                    </span>`);
            }
            return elements.join('<span class="ticker-separator">✦</span>');
        }

        function renderFeed(container) {
            const feedMsg = messages.find(m => m.type === 'feed');
            
            const todayStr = getFormattedDate(0);
            const tomorrowStr = getFormattedDate(1);

            let todayHtml = '<p class="empty">Стрічку ще не згенеровано.</p>';
            let tomorrowHtml = '';

            if (feedMsg && feedMsg.content) {
                // Розділяємо HTML на дві частини за тегом <h4>Завтра... або <h3>Завтра...
                const splitRegex = /(<h[1-6][^>]*>Завтра.*?<\/h[1-6]>)/i;
                const parts = feedMsg.content.split(splitRegex);
                if (parts.length >= 3) {
                    todayHtml = parts[0];
                    tomorrowHtml = parts[1] + parts.slice(2).join('');
                } else {
                    todayHtml = feedMsg.content;
                }
            }

            container.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h3 style="margin: 0;">Стрічка на сьогодні та завтра</h3>
                    <button class="btn btn-primary" onclick="loadData()">🔄 Оновити</button>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <h4 class="section-title">📅 СЬОГОДНІ, ${todayStr}</h4>
                    <div class="ticker-wrapper"><div class="ticker-marquee js-ticker">${buildTickerText(todayStr)}</div></div>
                    <div class="feed-content-block">${todayHtml}</div>
                </div>

                <div>
                    <h4 class="section-title">📅 ЗАВТРА, ${tomorrowStr}</h4>
                    <div class="ticker-wrapper"><div class="ticker-marquee js-ticker">${buildTickerText(tomorrowStr)}</div></div>
                    <div class="feed-content-block">${tomorrowHtml || '<p class="empty">На завтра відключень немає.</p>'}</div>
                </div>
            `;
            
            // Запуск JS-анімації для стрічки з ефектом прилипання
            document.querySelectorAll('.js-ticker').forEach(ticker => {
                // Дублюємо контент для безперервного прокручування
                ticker.innerHTML += ticker.innerHTML;
                let pos = 0;
                let speed = 0.6; // Швидкість (можна змінити)
                
                ticker.addEventListener('mouseenter', () => ticker.dataset.paused = "true");
                ticker.addEventListener('mouseleave', () => ticker.dataset.paused = "false");
                
                function step() {
                    if (!document.body.contains(ticker)) return; // Зупиняємо, якщо вкладку змінено
                    if (ticker.dataset.paused !== "true") {
                        pos += speed;
                        if (pos >= ticker.scrollWidth / 2) pos = 0; // Скидаємо на початок, створюючи "нескінченність"
                        ticker.scrollLeft = pos;
                    }
                    requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        }

        function renderTelegram(container) {
            const tgPosts = messages.filter(m => m.type === 'telegram_post').sort((a,b) => a.date.localeCompare(b.date));
            let html = '<h3>Telegram-пости</h3><div class="telegram-posts">';
            if (tgPosts.length === 0) {
                html += '<p class="empty">Немає постів.</p>';
            } else {
                tgPosts.forEach(post => {
                    html += `
                        <div class="post-card">
                            <div class="post-date">📅 ${post.date}</div>
                            <div class="post-body">${escapeHtml(post.content)}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(post.content).replace(/'/g, "\\'")}')">📋 Копіювати</button>
                        </div>`;
                });
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderArchive(container) {
            container.innerHTML = `
                <h3>Архів</h3>
                <p>Виберіть дату:</p>
                <input type="date" id="archiveDate" onchange="showArchived()">
                <div id="archiveResult" style="margin-top:15px;"></div>`;
        }

        function showArchived() {
            const dateStr = document.getElementById('archiveDate').value;
            const resultDiv = document.getElementById('archiveResult');
            if (!dateStr) { resultDiv.innerHTML = ''; return; }
            const relevant = messages.filter(m => m.date === dateStr);
            if (relevant.length === 0) {
                resultDiv.innerHTML = '<p class="empty">На цю дату записів немає.</p>';
                return;
            }
            let html = '';
            relevant.forEach(m => {
                if (m.type === 'feed') html += `<h4>Стрічка</h4>${m.content}`;
                else if (m.type === 'telegram_post') html += `<h4>Telegram пост</h4><pre>${escapeHtml(m.content)}</pre>`;
            });
            resultDiv.innerHTML = html;
        }

        function renderRaw(container) {
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h3>Дані з парсера (Табличний вигляд)</h3>
                    <button class="btn btn-primary" onclick="loadData()">🔄 Оновити</button>
                </div>`;
            
            if (rawOutages.length === 0) {
                html += '<p class="empty">Немає зібраних даних.</p>';
            } else {
                html += `
                <div class="raw-table-container">
                    <table class="raw-table">
                        <thead>
                            <tr>
                                <th style="width: 20%;">Населений пункт</th>
                                <th style="width: 10%;">Вид робіт</th>
                                <th style="width: 10%;">Створено</th>
                                <th style="width: 15%;">Початок</th>
                                <th style="width: 15%;">Кінець</th>
                                <th style="width: 30%;">Вулиці</th>
                            </tr>
                        </thead>
                        <tbody>`;
                        
                rawOutages.forEach(rec => {
                    let dtStart = rec.start_datetime || "";
                    if (dtStart.length >= 5 && !dtStart.includes(" ")) dtStart = dtStart.slice(0, -5) + " " + dtStart.slice(-5);
                    let dtEnd = rec.end_datetime || "";
                    if (dtEnd.length >= 5 && !dtEnd.includes(" ")) dtEnd = dtEnd.slice(0, -5) + " " + dtEnd.slice(-5);
                    
                    let streetsList = '<i>Немає даних</i>';
                    if (rec.streets_detailed && rec.streets_detailed.length > 0) {
                        streetsList = `<ul class="streets-list-raw">${rec.streets_detailed.map(s => {
                            if (s.houses) {
                                return `<li><details><summary>${escapeHtml(s.name)}</summary><div class="house-numbers">буд. ${escapeHtml(s.houses)}</div></details></li>`;
                            } else {
                                return `<li>${escapeHtml(s.name)}</li>`;
                            }
                        }).join('')}</ul>`;
                    } else if (rec.streets && rec.streets.length > 0) {
                        streetsList = `<ul>${rec.streets.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>`;
                    }
                        
                    let typeStyle = rec.type.includes('Аварійні') ? 'color: var(--danger); font-weight: bold;' : 'color: var(--warning); font-weight: bold;';

                    html += `<tr>
                        <td><strong>${escapeHtml(rec.settlement || 'Невідомо')}</strong></td>
                        <td style="${typeStyle}">${escapeHtml(rec.type || 'Невідомо')}</td>
                        <td>${escapeHtml(rec.created_date || '-')}</td>
                        <td>${escapeHtml(dtStart)}</td>
                        <td>${escapeHtml(dtEnd)}</td>
                        <td>${streetsList}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
            }
            container.innerHTML = html;
        }

        function renderStatus() {
            const area = document.getElementById('statusArea');
            if (!area) return;
            if (updateLog.length === 0) {
                area.innerHTML = '<div class="status-bar status-ok">🟢 Немає даних логу.</div>';
                return;
            }
            const last = updateLog[updateLog.length - 1];
            let statusClass = 'status-ok';
            let icon = '🟢';
            let text = 'Система працює.';
            if (last.status === 'html_structure_error' || last.status === 'http_error') {
                statusClass = 'status-error';
                icon = '🔴';
                text = `Помилка: ${last.message || last.status}. Оновлення призупинено.`;
            } else if (last.new_data_found) {
                text = `Нові дані отримано о ${last.timestamp}. Записів: ${last.records_count}.`;
            } else {
                text = `Дані без змін. Остання перевірка: ${last.timestamp}.`;
            }
            area.innerHTML = `<div class="status-bar ${statusClass}">${icon} ${text}</div>`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Скопійовано!');
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function switchTab(tab) { renderTab(tab); }

        // Запуск
        if (ADMIN_HASH.includes("ADMIN_HASH") || ADMIN_HASH.length < 10) {
            app.innerHTML = '<p style="color:red;">Помилка: ADMIN_HASH не налаштовано. Запустіть formatter.py для автоматичного оновлення.</p>';
        } else {
            login();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('passInput')) {
                checkPassword();
            }
        });
    </script>
</body>
</html>
